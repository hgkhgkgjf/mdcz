appId: com.shotheadman.mdcz
productName: MDCz

asar: true
electronLanguages:
  - zh-CN
  - en-US
asarUnpack:
  - resources/**
  - "**/*.node"
  - node_modules/sharp/**
  - node_modules/@img/sharp-*/**

# Disable electron-builder's automatic native rebuild — we ship a prebuilt
# Electron-ABI better_sqlite3.node via extraResources (see scripts/install-electron-sqlite.cjs).
# Letting electron-builder rebuild would clobber the hoisted Node-ABI copy used by server/test.
npmRebuild: false
buildDependenciesFromSource: false

directories:
  buildResources: build
  output: ../../release/${version}

files:
  - out/**
  - persistence/**
  - resources/**
  - package.json
  - "!**/*.map"
  - "!node_modules/mediainfo.js/dist/MediaInfoModule.wasm"
  - "!node_modules/openai/src/**"
  # Strip the hoisted better-sqlite3 native artifacts; the Electron-ABI .node
  # is shipped via extraResources/native and loaded explicitly through
  # PersistenceDatabaseConfig.nativeBinding.
  - "!**/node_modules/better-sqlite3/build/**"
  - "!**/node_modules/better-sqlite3/deps/**"
  - "!**/node_modules/better-sqlite3/src/**"
  - "!**/node_modules/better-sqlite3/binding.gyp"

extraResources:
  - from: node_modules/mediainfo.js/dist/MediaInfoModule.wasm
    to: MediaInfoModule.wasm
  - from: native/better_sqlite3.node
    to: native/better_sqlite3.node

win:
  executableName: MDCz
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  files:
    - "!**/node_modules/@img/sharp-{darwin,linux,linuxmusl}-*/**"
    - "!**/node_modules/@img/sharp-libvips-*/**"
    - "!**/node_modules/@img/sharp-win32-arm64/**"
    - "!**/node_modules/impit-{darwin,linux}-*/**"
    - "!**/node_modules/impit-win32-arm64-*/**"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  files:
    - "!**/node_modules/@img/sharp-{win32,linux,linuxmusl}-*/**"
    - "!**/node_modules/@img/sharp-libvips-{linux,linuxmusl,win32}-*/**"
    - "!**/node_modules/impit-{win32,linux}-*/**"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  category: Utility
  maintainer: ShotHeadman <123543875+ShotHeadman@users.noreply.github.com>
  executableName: mdcz
  target:
    - AppImage
  files:
    - "!**/node_modules/@img/sharp-{win32,darwin,linuxmusl}-*/**"
    - "!**/node_modules/@img/sharp-libvips-{win32,darwin,linuxmusl}-*/**"
    - "!**/node_modules/impit-{win32,darwin}-*/**"
    - "!**/node_modules/impit-linux-arm64-*/**"
    - "!**/node_modules/impit-linux-x64-musl/**"
